{% extends "admin/base.html" %}
{% block title %}Upload Media{% endblock %}
{% block page_title %}Upload Media{% endblock %}
{% block content %}
<div class="card" style="max-width:680px;">
  <div class="card-header">
    <h2><i class="fas fa-upload" style="color:var(--primary);margin-right:8px;"></i>Upload Media</h2>
    <a href="{{ url_for('admin_bp.gallery') }}" class="btn btn-secondary btn-sm"><i class="fas fa-arrow-left"></i> Back</a>
  </div>
  <form method="POST" enctype="multipart/form-data">
    <div class="form-group">
      <label>Files * (Images or Videos — multiple allowed)</label>
      <input type="file" name="files" class="form-control" accept="image/*,video/*" multiple required>
      <small style="color:var(--text-muted);font-size:.73rem;">Allowed: JPG, PNG, GIF, WEBP, MP4, WEBM. Max 16MB per file.</small>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Title (applies to all files)</label>
        <input type="text" name="title" class="form-control" placeholder="Optional title" maxlength="200">
      </div>
      <div class="form-group">
        <label>Album</label>
        <input type="text" name="album" class="form-control" value="General" placeholder="Album name" maxlength="100">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Year</label>
        <input type="number" name="year" class="form-control" value="{{ now.year if now else 2025 }}" min="2000" max="2100">
      </div>
      <div class="form-group">
        <label>Display Order</label>
        <input type="number" name="display_order" class="form-control" value="99">
      </div>
    </div>
    <div class="form-group">
      <label>Description</label>
      <textarea name="description" class="form-control" rows="2" maxlength="500"></textarea>
    </div>
    <button type="submit" class="btn btn-primary"><i class="fas fa-upload"></i> Upload</button>
  </form>
</div>
{% endblock %}
